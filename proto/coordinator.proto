syntax = "proto3";

package pregel.coordinator;

service Coordinator {
  rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
  rpc WaitForAllReady(WaitForAllReadyRequest) returns (WaitForAllReadyResponse);
  rpc ReportSuperstepDone(ReportSuperstepDoneRequest) returns (ReportSuperstepDoneResponse);
  rpc GetCurrentSuperstep(GetCurrentSuperstepRequest) returns (GetCurrentSuperstepResponse);
  rpc WaitForAdvance(WaitForAdvanceRequest) returns (stream AdvanceNotification);
  // Session mode: worker blocks until coordinator starts a new job.
  rpc WaitForJobStart(WaitForJobStartRequest) returns (stream JobStartNotification);
  // Worker reports job results when halting (vertex values from its partition).
  rpc ReportJobResults(ReportJobResultsRequest) returns (ReportJobResultsResponse);
}

message WaitForJobStartRequest {}

message JobStartNotification {
  uint32 job_id = 1;
  string algo = 2;
  string program = 3;  // WASM path, empty = native
  uint64 total_vertices = 4;  // For PageRank 1/N init
}

message RegisterWorkerRequest {
  uint32 worker_id = 1;
  string address = 2;
  uint64 vertex_count = 3;
}

message RegisterWorkerResponse {}

message WaitForAllReadyRequest {}

message WaitForAllReadyResponse {}

message ReportSuperstepDoneRequest {
  uint32 worker_id = 1;
  uint64 superstep = 2;
  uint64 messages_sent = 3;
}

message ReportSuperstepDoneResponse {}

message GetCurrentSuperstepRequest {}

message GetCurrentSuperstepResponse {
  uint64 superstep = 1;
}

message WaitForAdvanceRequest {
  uint64 from_superstep = 1;
}

message AdvanceNotification {
  uint64 superstep = 1;
}

message ReportJobResultsRequest {
  uint32 job_id = 1;
  uint32 worker_id = 2;
  repeated VertexResult vertices = 3;
}

message VertexResult {
  uint64 vertex_id = 1;
  bytes value = 2;
}

message ReportJobResultsResponse {}
